name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      test_pypi:
        description: "Publish to TestPyPI instead of PyPI"
        type: boolean
        default: false

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tool
        run: python -m pip install --upgrade pip build

      - name: Build distributions
        run: python -m build

      - name: Verify wheel contains py.typed
        run: |
          python -c "
          import zipfile, sys
          wheel = [f for f in __import__('pathlib').Path('dist').glob('*.whl')][0]
          with zipfile.ZipFile(wheel) as z:
              assert any('py.typed' in n for n in z.namelist()), 'py.typed missing from wheel'
              assert sum(1 for n in z.namelist() if n.endswith('.schema.json')) == 23, 'expected 23 schemas'
          print('wheel verified:', wheel.name)
          "

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to ${{ inputs.test_pypi && 'TestPyPI' || 'PyPI' }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.test_pypi && 'testpypi' || 'pypi' }}
      url: ${{ inputs.test_pypi && 'https://test.pypi.org/p/agent-memory-contracts' || 'https://pypi.org/p/agent-memory-contracts' }}
    permissions:
      id-token: write  # required for PyPI trusted publishing (OIDC)
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        if: ${{ inputs.test_pypi }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Publish to PyPI
        if: ${{ !inputs.test_pypi }}
        uses: pypa/gh-action-pypi-publish@release/v1
